<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Система пропусків у комп’ютерний клас </title>
  <link rel="stylesheet" href="styles.css" />
  <script src="passes.dom.js" defer></script>
  <script src="passes.functions.js" defer></script>
  <script src="passes.handlers.js" defer></script>

  <script src="users.dom.js" defer></script>
  <script src="users.functions.js" defer></script>
  <script src="users.handlers.js" defer></script>

  <script src="app.js" defer></script>
</head>

<body>
  <nav class="top-menu">
    <button class="tab-btn active" data-target="passes-view">Пропуски</button>
    <button class="tab-btn" data-target="users-view">Користувачі</button>
  </nav>

  <div id="passes-view" class="view active">
    <div class="main-container">
    <form id="form">
      <caption>
        <h2>Додайте пропуск</h2> 
      </caption>
      <div class="name">
        <label for="nameInput">Введіть ваше ім'я</label>
        <input id="nameInput" type="text" name="userName" placeholder="Іванов Іван" required />
        <p class="error-text" id="nameError"></p>
      </div>
      <div class="group">
        <label for="statusSelect">Причина</label>
        <select id="statusSelect" required>
          <option value="">Оберіть причину</option>
          <option value="Вчитель">Вчитель</option>
          <option value="Студент">Студент</option>
          <option value="Інше">Інше</option>
        </select>
        <p class="error-text" id="statusError"></p>
      </div>

      <div class="date">
        <label for="dateInput">Дійсний до</label>
        <input id="dateInput" type="date" required />
        <p class="error-text" id="dateError"></p>
      </div>

      <div class="name">
        <label for="adminInput">Ім'я Адміністратора</label>
        <input id="adminInput" type="text" name="adminName" placeholder="Прізвище Ім'я" required />
        <p class="error-text" id="adminError"></p>
      </div>

      <div class="comment-field">
        <label for="commentInput">Коментар</label>
        <textarea id="commentInput" rows="4"></textarea>
        <p class="error-text" id="commentError"></p>
      </div>

      <div class="buttons">
        <button type="submit" id="submitBtn">Додати</button>
        <button type="button" id="clearBtn">Очистити</button>
      </div>
    </form>

    <div class="passes">
      <h2>Список пропусків</h2>
      <table class="table" id="passesTable">
        <div class="filters">
          <div class="search">
            <input id="searchInput" type="text" name="searchName" placeholder="Пошук за ім'ям..." required />
            <p class="error-text" id="searchError"></p>
          </div>
          <div class="group">
            <select id="statusSearch" required>
              <option value="Всі" id="All">Всі причини</option>
              <option value="Вчитель" id="Teacher">Вчитель</option>
              <option value="Студент" id="Student">Студент</option>
              <option value="Інше" id="Other">Інше</option>
            </select>
            <p class="error-text" id="statusError"></p>
          </div>
        </div>  
        <thead>
          <tr>
            <th>Ім'я</th>
            <th>Причина</th>
            <th>Дійсний до</th>
            <th>Адміністратор</th>
            <th>Коментар</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
            </td>
          </tr>
        </tbody>        
        </div>
    </table>
  </div>
  </div>
 </div>

  <div id="users-view" class="view">
    <div class="main-container">
      <form id="userForm" novalidate>
        <h2>Додати користувача</h2>
        <div class="group">
          <label>Ім'я</label>
          <input id="userNameInput" type="text" required />
          <p class="error-text" id="userNameError"></p>
        </div>
        <div class="group">
          <label>Роль</label>
          <select id="userRoleSelect" required>
            <option value="">Оберіть роль</option>
            <option value="Студент">Студент</option>
            <option value="Вчитель">Вчитель</option>
            <option value="Адміністратор">Адміністратор</option>
          </select>
          <p class="error-text" id="userRoleError"></p>
        </div>
        <button type="submit" id="submitUserBtn">Зберегти користувача</button>
      </form>

      <div class="passes">
        <h2>Список користувачів</h2>
        <div class="filters">
          <div class="search">
            <input id="userSearchInput" type="text" placeholder="Пошук за ім'ям..." />
          </div>
          <div class="group">
            <select id="userRoleSearch">
              <option value="Всі">Всі</option>
              <option value="Студент">Студент</option>
              <option value="Вчитель">Вчитель</option>
              <option value="Адміністратор">Адміністратор</option>
            </select>
          </div>
        </div>
        <table class="table" id="usersTable">
          <thead>
            <tr><th>Ім'я</th><th>Роль</th><th>Дії</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

</body>
</html>
