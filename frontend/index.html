<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Система пропусків у комп’ютерний клас</title>
  <link rel="stylesheet" href="public/styles.css" />
</head>
<body>
  <div id="notice" class="notice"></div>

  <nav class="top-menu">
    <button class="tab-btn active" data-target="passes-view">Пропуски</button>
    <button class="tab-btn" data-target="users-view">Користувачі</button>
    <button class="tab-btn" data-target="logs-view">Журнал дій</button>
  </nav>

  <div id="passes-view" class="view active">
    <div class="main-container">
      <form id="form" novalidate>
        <h2>Додайте пропуск</h2> 

        <div class="name">
          <label for="nameInput">Введіть ваше ім'я</label>
          <input id="nameInput" type="text" autocomplete="off" placeholder="Іванов Іван" required />
          <p class="error-text" id="nameError"></p>
        </div>

        <div class="name">
          <label for="emailInput">Email користувача</label>
          <input id="emailInput" type="email" autocomplete="off" placeholder="student@gmail.com" required />
          <p class="error-text" id="emailError"></p>
        </div>

        <div class="group">
          <label for="statusSelect">Причина</label>
          <select id="statusSelect" required>
            <option value="">Оберіть причину</option>
            <option value="Вчитель">Вчитель</option>
            <option value="Студент">Студент</option>
            <option value="Техперсонал">Техперсонал</option>
          </select>
          <p class="error-text" id="statusError"></p>
        </div>

        <div class="date">
          <label for="dateInput">Дійсний до</label>
          <input id="dateInput" type="date" required />
          <p class="error-text" id="dateError"></p>
        </div>

        <div class="custom-select-wrapper" id="adminSelectWrapper">
          <label for="adminInput">Адміністратор</label>
          <input type="text" id="adminInput" placeholder="Оберіть адміністратора" autocomplete="off">
          <ul class="custom-options-list" id="adminOptionsList"></ul>
          <p class="error-text" id="adminError"></p>
        </div>

        <div class="comment-field">
          <label for="commentInput">Коментар</label>
          <textarea id="commentInput" rows="4"></textarea>
          <p class="error-text" id="commentError"></p>
        </div>

        <div class="buttons">
          <button type="submit" id="submitBtn">Додати</button>
          <button type="button" id="clearBtn">Очистити</button>
        </div>
      </form>

      <div class="passes">
        <h2>Список пропусків</h2>
        
        <div class="filters">
          <div class="search">
            <input id="searchInput" type="text" autocomplete="off" placeholder="Пошук за ім'ям..." />
          </div>
          <div class="group">
            <select id="statusSearch">
              <option value="Всі">Всі причини</option>
              <option value="Вчитель">Вчитель</option>
              <option value="Студент">Студент</option>
              <option value="Техперсонал">Техперсонал</option>
            </select>
          </div>
        </div>  

        <div class="status-container" id="passesStatus"></div>
        
        <table class="table" id="passesTable">
          <thead>
            <tr>
              <th>Ім'я</th>
              <th>Причина</th>
              <th>Дійсний до</th>
              <th>Адміністратор</th>
              <th>Коментар</th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody></tbody>        
        </table>
      </div>
    </div>
  </div>

  <div id="users-view" class="view">
    <div class="main-container">
      <form id="userForm" novalidate>
        <h2>Додати користувача</h2>
        <div class="group">
          <label>Ім'я</label>
          <input id="userNameInput" type="text" autocomplete="off" placeholder="Іван Іванов" required />
          <p class="error-text" id="userNameError"></p>
        </div>
        <div class="group">
          <label>Email</label>
          <input id="userEmailInput" type="email" autocomplete="off" placeholder="student@gmail.com" required />
          <p class="error-text" id="userEmailError"></p>
        </div>
        <div class="group">
          <label>Роль</label>
          <select id="userRoleSelect" required>
            <option value="">Оберіть роль</option>
            <option value="Студент">Студент</option>
            <option value="Вчитель">Вчитель</option>
            <option value="Адміністратор">Адміністратор</option>
            <option value="Техперсонал">Техперсонал</option>
          </select>
          <p class="error-text" id="userRoleError"></p>
        </div>
        <button type="submit" id="submitUserBtn">Зберегти користувача</button>
        <button type="button" id="clearUserBtn">Очистити</button>
      </form>

      <div class="passes">
        <h2>Список користувачів</h2>
        <div class="filters">
          <div class="search">
            <input id="userSearchInput" type="text" autocomplete="off" placeholder="Пошук за ім'ям" />
          </div>
          <div class="group">
            <select id="userRoleSearch">
              <option value="Всі">Всі</option>
              <option value="Студент">Студент</option>
              <option value="Вчитель">Вчитель</option>
              <option value="Адміністратор">Адміністратор</option>
              <option value="Техперсонал">Техперсонал</option>
            </select>
          </div>
        </div>
        <div class="status-container" id="usersStatus"></div>
        <table class="table" id="usersTable">
          <thead>
            <tr><th>Ім'я</th><th>Роль</th><th>Email</th><th>Дії</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="logs-view" class="view">
    <div class="main-container" style="justify-content: center;">
      <div class="passes" style="width: 100%; max-width: 800px;">
        <h2>Історія подій</h2>
        <div class="search">
          <input type="text" id="logSearchInput" autocomplete="off" placeholder="Пошук подій"/>
        </div>
        <div class="status-container" id="logsStatus"></div>
        <table class="table" id="logsTable">
          <thead>
            <tr><th>Дата та час</th><th>Дія</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="customModal" class="modal-overlay">
        <div class="modal-box">
            <p id="modalText">Повідомлення</p>
            <div class="modal-actions">
                <button id="modalCancel" class="btn-cancel">Скасувати</button>
                <button id="modalOk" class="btn-ok">ОК</button>
            </div>
        </div>
    </div>
    
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
